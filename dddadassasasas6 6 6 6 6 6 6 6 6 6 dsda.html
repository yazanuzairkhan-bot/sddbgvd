<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: o;
            font-family: sans-serif;
            background-color: rgb(148, 241, 162);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 80px auto 60px;
            gap: 10px;
            height: 100vh;
            padding: 10px
        }

        .box {
            background: bisque;
            padding: 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .header {
            grid-column: 1/3;
            background: rgb(253, 243, 131);
            text-align: center;
        }

        .sidebar {
            background: rgb(248, 210, 116);
            text-align: center;
        }

        .content {
            background: rgb(239, 255, 149);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .card {
            background: rgb(143, 251, 255);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }

        .footer {
            background: rgb(253, 203, 111);
            grid-column: 1/3;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box header">
            4 famous indian sweet treats.
        </div>
        <div class="box sidebar">
            Latika Mahora helped with this since it was for in class project(#Codingal
            #Work).
        </div>
        <div class="box content">
            <div class="card">
                <img src="Gulab-Jamun-1024x683.jpg" alt="" width="140px">
                Gulab Jamun
            </div>
            <div class="card">
                <img src="Khaman-Dhokla-6.jpg" alt="" width="115px" height="98">
               Dhokla
            </div>
            <div class="card">
                <img src="rasmalai_can_recipe.jpg" alt="" width="140" height="105">
                Rasmalai
            </div>
            <div class="card">
                <img src="pistachio-cinnamon-and-lime-kulfi-98235-1.jpeg" alt="" width="140px" height="110">
                Malai Kulfi
            </div>
        </div>
        <div class="box footer">
            gmail is yazen-uzair-khan@gmail.mail(REAL GMAIL TINGY)
</body>
</html>
